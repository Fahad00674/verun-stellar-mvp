<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2200 1500" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#eef2ee"/>
    </linearGradient>
    <linearGradient id="grnHead" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#16a34a"/><stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="bluHead" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="prpHead" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="redHead" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ef4444"/><stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>

    <marker id="aBlue" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#2563eb"/>
    </marker>
    <marker id="aPrp" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#7c3aed"/>
    </marker>
    <marker id="aRed" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#dc2626"/>
    </marker>

    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="3" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadowSm" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.12"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="2200" height="1500" fill="url(#bg)"/>

  <!-- ===== Header ===== -->
  <text x="1100" y="62" text-anchor="middle" font-size="38" font-weight="800" fill="#0f172a" letter-spacing="-0.5">
    Verun Soulbound Token — Protocol-Custodial Architecture
  </text>
  <text x="1100" y="98" text-anchor="middle" font-size="18" fill="#64748b">
    How an AI agent gets a verifiable on-chain trust credential, without ever holding a wallet
  </text>

  <!-- Compliance pills -->
  <g transform="translate(750, 122)">
    <rect width="170" height="34" rx="17" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2"/>
    <text x="85" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#15803d">EU AI Act Art. 12</text>
  </g>
  <g transform="translate(940, 122)">
    <rect width="170" height="34" rx="17" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.2"/>
    <text x="85" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#6d28d9">EU AI Act Art. 14</text>
  </g>
  <g transform="translate(1130, 122)">
    <rect width="170" height="34" rx="17" fill="#dbeafe" stroke="#2563eb" stroke-width="1.2"/>
    <text x="85" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">MiFID II Art. 17</text>
  </g>
  <g transform="translate(1320, 122)">
    <rect width="220" height="34" rx="17" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2"/>
    <circle cx="22" cy="17" r="5" fill="#16a34a"/>
    <text x="125" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#15803d">Live · Stellar Testnet</text>
  </g>

  <!-- ============= AGENT ============= -->
  <g filter="url(#shadow)">
    <rect x="60" y="220" width="420" height="500" rx="20" fill="#ffffff" stroke="#3b82f6" stroke-width="2.5"/>
    <rect x="60" y="220" width="420" height="64" rx="20" fill="url(#bluHead)"/>
    <rect x="60" y="262" width="420" height="22" fill="url(#bluHead)"/>
    <text x="270" y="263" text-anchor="middle" font-size="24" font-weight="800" fill="#ffffff">AI AGENT</text>
  </g>

  <text x="84" y="320" font-size="13" font-weight="700" fill="#9ca3af" letter-spacing="0.8">IDENTITY</text>
  <rect x="84" y="332" width="372" height="48" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.2"/>
  <text x="270" y="362" text-anchor="middle" font-family="ui-monospace,SF Mono,Menlo,Consolas,monospace" font-size="16" font-weight="600" fill="#1e3a8a">agt_openclaw_01</text>

  <text x="84" y="418" font-size="13" font-weight="700" fill="#9ca3af" letter-spacing="0.8">DOES NOT HAVE</text>
  <g font-size="14" fill="#dc2626">
    <text x="100" y="446">✗  Stellar wallet / G-address</text>
    <text x="100" y="471">✗  Private keys</text>
    <text x="100" y="496">✗  XLM funds</text>
    <text x="100" y="521">✗  Custody responsibility</text>
  </g>

  <text x="84" y="560" font-size="13" font-weight="700" fill="#9ca3af" letter-spacing="0.8">ONLY HAS</text>
  <g font-size="14" fill="#16a34a">
    <text x="100" y="588">✓  An agentId string</text>
    <text x="100" y="613">✓  Knowledge of Verun's URL</text>
    <text x="100" y="638">✓  HTTP capability</text>
  </g>

  <rect x="84" y="668" width="372" height="32" rx="6" fill="#fef3c7" stroke="#fcd34d"/>
  <text x="270" y="688" text-anchor="middle" font-size="12" fill="#92400e" font-weight="600">→ Zero key-management burden, by design</text>

  <!-- ============= VERUN (Center) ============= -->
  <g filter="url(#shadow)">
    <rect x="580" y="220" width="900" height="780" rx="20" fill="#ffffff" stroke="#16a34a" stroke-width="2.5"/>
    <rect x="580" y="220" width="900" height="64" rx="20" fill="url(#grnHead)"/>
    <rect x="580" y="262" width="900" height="22" fill="url(#grnHead)"/>
    <text x="1030" y="263" text-anchor="middle" font-size="24" font-weight="800" fill="#ffffff">VERUN PROTOCOL WALLET</text>
  </g>

  <text x="1030" y="318" text-anchor="middle" font-size="13" font-weight="600" fill="#15803d" letter-spacing="0.5">ISSUER · REGISTRY · ANCHOR</text>

  <!-- Address (clean, no per-char spacing) -->
  <rect x="610" y="335" width="840" height="42" rx="8" fill="#f0fdf4" stroke="#bbf7d0"/>
  <text x="1030" y="362" text-anchor="middle" font-family="ui-monospace,SF Mono,Menlo,Consolas,monospace" font-size="15" fill="#166534">GD2CGWE3LVWN6DQCNVMFWPGNP42FXQ66MLRXFUHSTCR3OUVHFJBYFTHW</text>

  <!-- Step 1 — Validators -->
  <text x="610" y="412" font-size="16" font-weight="800" fill="#0f172a">Step 1  ·  Run 2-of-3 validator consensus</text>
  <g transform="translate(610, 425)">
    <rect width="270" height="84" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" filter="url(#shadowSm)"/>
    <text x="135" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#166534">BCP Partners</text>
    <text x="135" y="55" text-anchor="middle" font-size="12" fill="#16a34a">EU regulated GmbH · Berlin</text>
    <text x="135" y="73" text-anchor="middle" font-size="12" fill="#16a34a">MiFID II + AI Act</text>
  </g>
  <g transform="translate(900, 425)">
    <rect width="270" height="84" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" filter="url(#shadowSm)"/>
    <text x="135" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#166534">tokenforge</text>
    <text x="135" y="55" text-anchor="middle" font-size="12" fill="#16a34a">eWpG Security Tokens</text>
    <text x="135" y="73" text-anchor="middle" font-size="12" fill="#16a34a">BaFin compliant</text>
  </g>
  <g transform="translate(1190, 425)">
    <rect width="260" height="84" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" filter="url(#shadowSm)"/>
    <text x="130" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#166534">Test / 3rd Slot</text>
    <text x="130" y="55" text-anchor="middle" font-size="12" fill="#16a34a">Open for institutional</text>
    <text x="130" y="73" text-anchor="middle" font-size="12" fill="#16a34a">partner</text>
  </g>

  <!-- Step 2 — Registry -->
  <text x="610" y="552" font-size="16" font-weight="800" fill="#0f172a">Step 2  ·  Write credential to manageData (on-chain registry)</text>
  <rect x="610" y="565" width="840" height="200" rx="10" fill="#fafafa" stroke="#d1d5db" stroke-width="1.5"/>

  <text x="630" y="592" font-family="ui-monospace,SF Mono,Menlo,monospace" font-size="12" font-weight="700" fill="#9ca3af">key (stored on protocol account)</text>
  <text x="1010" y="592" font-family="ui-monospace,SF Mono,Menlo,monospace" font-size="12" font-weight="700" fill="#9ca3af">value (tier:score:timestamp)</text>
  <line x1="630" y1="602" x2="1430" y2="602" stroke="#e5e7eb" stroke-dasharray="3 3"/>

  <g font-family="ui-monospace,SF Mono,Menlo,monospace" font-size="13.5">
    <text x="630" y="630" fill="#16a34a">vtrust_agt_openclaw_01</text>
    <text x="1010" y="630" fill="#374151">→  MED:720:2026-04-30T14:40:53Z</text>

    <text x="630" y="658" fill="#16a34a">vtrust_agt_demo_002</text>
    <text x="1010" y="658" fill="#374151">→  LOW:850:2026-04-30T14:21:30Z</text>

    <text x="630" y="686" fill="#16a34a">vtrust_agt_test_003</text>
    <text x="1010" y="686" fill="#374151">→  MED:700:2026-04-30T14:21:42Z</text>
  </g>

  <text x="630" y="722" font-size="12" fill="#6b7280" font-style="italic">Each row = one issued SBT.  Adding a row = mint.  Clearing a row = revoke (kill-switch).</text>
  <text x="630" y="744" font-size="12" fill="#6b7280" font-style="italic">All operations permanently auditable in Stellar transaction history.</text>

  <!-- Step 3 — Anchor -->
  <text x="610" y="808" font-size="16" font-weight="800" fill="#0f172a">Step 3  ·  Anchor sha256(credential) as memo (tamper-proof)</text>
  <rect x="610" y="822" width="840" height="160" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>

  <g font-size="13" fill="#166534">
    <text x="630" y="852">•  Each mint/revoke = 1 transaction with 2 ops (manageData + 1-stroop self-payment)</text>
    <text x="630" y="876">•  Memo field = sha256(credentialJson) — 32-byte cryptographic commitment</text>
    <text x="630" y="900">•  Confirmation: ~5 seconds on Stellar testnet</text>
    <text x="630" y="924">•  Cost: ~100 stroops (~0.00001 XLM) per operation</text>
    <text x="630" y="948">•  Auditor can replay the JSON, recompute the hash, verify it matches the on-chain memo</text>
  </g>
  <text x="630" y="975" font-size="12" fill="#15803d" font-style="italic" font-weight="600">→ Cannot be forged. Cannot be replayed. Cannot be deleted.</text>

  <!-- ============= CONSUMER ============= -->
  <g filter="url(#shadow)">
    <rect x="1580" y="220" width="560" height="500" rx="20" fill="#ffffff" stroke="#8b5cf6" stroke-width="2.5"/>
    <rect x="1580" y="220" width="560" height="64" rx="20" fill="url(#prpHead)"/>
    <rect x="1580" y="262" width="560" height="22" fill="url(#prpHead)"/>
    <text x="1860" y="263" text-anchor="middle" font-size="24" font-weight="800" fill="#ffffff">CONSUMER</text>
  </g>

  <text x="1604" y="320" font-size="13" font-weight="700" fill="#9ca3af" letter-spacing="0.8">WHO ARE THEY</text>
  <g font-size="14" fill="#374151">
    <text x="1620" y="348">•  tokenforge — the platform that</text>
    <text x="1640" y="368">processes the actual €5K transfer</text>
    <text x="1620" y="395">•  Auditor / regulator</text>
    <text x="1620" y="418">•  Any DeFi platform</text>
    <text x="1620" y="441">•  Anyone with internet access</text>
  </g>

  <text x="1604" y="478" font-size="13" font-weight="700" fill="#9ca3af" letter-spacing="0.8">VERIFIES VIA HORIZON</text>
  <rect x="1604" y="490" width="512" height="100" rx="10" fill="#faf5ff" stroke="#ddd6fe" stroke-width="1.2"/>
  <g font-family="ui-monospace,SF Mono,Menlo,monospace" font-size="13" fill="#6d28d9">
    <text x="1860" y="518" text-anchor="middle" font-weight="700">GET</text>
    <text x="1860" y="540" text-anchor="middle" font-size="12">horizon-testnet.stellar.org</text>
    <text x="1860" y="558" text-anchor="middle" font-size="12">/accounts/&lt;verun-pubkey&gt;</text>
    <text x="1860" y="576" text-anchor="middle" font-size="12">/data/vtrust_agt_openclaw_01</text>
  </g>

  <text x="1604" y="625" font-size="13" font-weight="700" fill="#9ca3af" letter-spacing="0.8">RESPONSE</text>
  <text x="1620" y="652" font-size="14" fill="#16a34a">✓  "MED:720:..." → process trade</text>
  <text x="1620" y="676" font-size="14" fill="#dc2626">✗  HTTP 404 → block / deny</text>
  <text x="1620" y="700" font-size="11" fill="#6b7280" font-style="italic">  ~50ms response · zero auth required</text>

  <!-- ============= KILL-SWITCH ============= -->
  <g filter="url(#shadow)">
    <rect x="1580" y="760" width="560" height="240" rx="20" fill="#ffffff" stroke="#dc2626" stroke-width="2.5"/>
    <rect x="1580" y="760" width="560" height="64" rx="20" fill="url(#redHead)"/>
    <rect x="1580" y="802" width="560" height="22" fill="url(#redHead)"/>
    <text x="1860" y="803" text-anchor="middle" font-size="24" font-weight="800" fill="#ffffff">🛑  KILL-SWITCH</text>
  </g>

  <text x="1604" y="858" font-size="13" fill="#7f1d1d">If an agent misbehaves — wrong trades, suspicious</text>
  <text x="1604" y="877" font-size="13" fill="#7f1d1d">pattern, key leak — Verun revokes immediately:</text>

  <rect x="1604" y="890" width="512" height="40" rx="8" fill="#fef2f2" stroke="#fecaca"/>
  <text x="1860" y="916" text-anchor="middle" font-family="ui-monospace,SF Mono,Menlo,monospace" font-size="13" font-weight="700" fill="#991b1b">POST  /api/revoke-sbt</text>

  <text x="1604" y="954" font-size="12" fill="#7f1d1d" font-style="italic">~5 seconds → SBT cleared on-chain</text>
  <text x="1604" y="976" font-size="11" fill="#991b1b" font-weight="600">EU MiFID II Art. 17 mandatory for AI trading</text>

  <!-- ============= ARROWS (Numbered) ============= -->

  <!-- Arrow 1: Agent → Verun -->
  <path d="M 480 460 L 580 460" stroke="#2563eb" stroke-width="4" fill="none" marker-end="url(#aBlue)"/>
  <circle cx="530" cy="430" r="22" fill="#2563eb" filter="url(#shadowSm)"/>
  <text x="530" y="437" text-anchor="middle" font-size="17" font-weight="800" fill="#ffffff">1</text>
  <g>
    <rect x="465" y="478" width="130" height="48" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.2"/>
    <text x="530" y="496" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">POST /mint-sbt</text>
    <text x="530" y="512" text-anchor="middle" font-family="ui-monospace,SF Mono,Menlo,monospace" font-size="10" fill="#1e3a8a">{ agentId, score }</text>
  </g>

  <!-- Arrow 2: Verun → Consumer -->
  <path d="M 1480 460 L 1580 460" stroke="#7c3aed" stroke-width="4" fill="none" marker-end="url(#aPrp)"/>
  <circle cx="1530" cy="430" r="22" fill="#7c3aed" filter="url(#shadowSm)"/>
  <text x="1530" y="437" text-anchor="middle" font-size="17" font-weight="800" fill="#ffffff">2</text>
  <g>
    <rect x="1460" y="478" width="140" height="48" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.2"/>
    <text x="1530" y="496" text-anchor="middle" font-size="11" font-weight="700" fill="#6d28d9">public read</text>
    <text x="1530" y="512" text-anchor="middle" font-size="10" fill="#6d28d9">Horizon · zero auth</text>
  </g>

  <!-- Arrow 3: Kill-switch curved -->
  <path d="M 1580 880 Q 1490 880 1490 760 Q 1490 690 1450 690" stroke="#dc2626" stroke-width="3" stroke-dasharray="8 4" fill="none" marker-end="url(#aRed)"/>
  <circle cx="1490" cy="745" r="22" fill="#dc2626" filter="url(#shadowSm)"/>
  <text x="1490" y="752" text-anchor="middle" font-size="17" font-weight="800" fill="#ffffff">3</text>

  <!-- ============= MONEY FLOW (bottom) ============= -->
  <g filter="url(#shadow)">
    <rect x="60" y="1040" width="2080" height="290" rx="20" fill="#fffbeb" stroke="#f59e0b" stroke-width="2.5"/>
  </g>

  <g transform="translate(80, 1075)">
    <circle cx="22" cy="20" r="22" fill="#fbbf24"/>
    <text x="22" y="29" text-anchor="middle" font-size="22">💰</text>
    <text x="60" y="29" font-size="22" font-weight="800" fill="#92400e">Money flow is SEPARATE from Verun</text>
  </g>

  <text x="80" y="1148" font-size="15" fill="#78350f">
    <tspan font-weight="700">Verun is the trust layer only.</tspan>  Verun NEVER touches user funds. The actual €5,000 EURC (or any other transaction value) is processed by the
  </text>
  <text x="80" y="1172" font-size="15" fill="#78350f">
    consumer platform — typically tokenforge — using their own Chain API and own custody. Verun's job ends with "yes/no, this agent is verified."
  </text>

  <text x="80" y="1212" font-size="15" font-weight="700" fill="#92400e">Real-world end-to-end flow (5 hops):</text>

  <g font-size="13.5" fill="#78350f">
    <text x="100" y="1238">①  Agent calls Verun → <tspan font-family="ui-monospace,SF Mono,Menlo,monospace">POST /api/mint-sbt</tspan> → Verun runs consensus → issues SBT credential (free, instant on testnet)</text>
    <text x="100" y="1260">②  Agent presents SBT to tokenforge (or tokenforge queries Horizon directly to verify the SBT is valid)</text>
    <text x="100" y="1282">③  tokenforge verifies via public Horizon query (zero auth required, ~50ms response)</text>
    <text x="100" y="1304">④  tokenforge processes the actual €5,000 EURC transfer using THEIR own settlement infrastructure (Verun is no longer involved)</text>
    <text x="100" y="1326">⑤  Anytime later, Verun can revoke the SBT — tokenforge's next verification will see "credential cleared" → blocks future operations</text>
  </g>

  <!-- ============= KILL-SWITCH MEANING (callout) ============= -->
  <g transform="translate(1480, 1370)" filter="url(#shadowSm)">
    <rect width="700" height="100" rx="14" fill="#ffffff" stroke="#dc2626" stroke-width="1.5"/>
    <text x="20" y="32" font-size="15" font-weight="800" fill="#991b1b">🛑  What "kill-switch" means</text>
    <text x="20" y="56" font-size="12.5" fill="#7f1d1d">Like an emergency stop button on industrial machinery, or "block my credit card" on banking. Verun</text>
    <text x="20" y="74" font-size="12.5" fill="#7f1d1d">can disable any agent's credential in one transaction (~5s), without the agent's cooperation.</text>
    <text x="20" y="92" font-size="11" fill="#991b1b" font-style="italic">Without it, no EU financial license is granted to AI systems handling regulated assets.</text>
  </g>

  <!-- Footer -->
  <text x="60" y="1430" font-size="12" fill="#64748b" font-style="italic">
    Same protocol-custodial architecture as the Algorand reference implementation
  </text>
  <text x="60" y="1452" font-size="12" fill="#64748b">
    <tspan font-weight="600">Verun Stellar MVP</tspan>  ·  github.com/Fahad00674/verun-stellar-mvp  ·  verun-stellar-mvp.vercel.app  ·  BCP Partners GmbH 2026
  </text>
</svg>
