<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fafafa"/><stop offset="100%" stop-color="#f0f4f0"/>
    </linearGradient>
    <linearGradient id="grnHead" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#16a34a"/><stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="bluHead" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="prpHead" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>

    <marker id="aBlue" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#2563eb"/>
    </marker>
    <marker id="aPrp" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#7c3aed"/>
    </marker>
    <marker id="aRed" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#dc2626"/>
    </marker>

    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5"/>
      <feOffset dx="0" dy="4" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Header -->
  <text x="800" y="68" text-anchor="middle" font-size="38" font-weight="800" fill="#0f172a" letter-spacing="-0.5">
    How an AI Agent Gets a Soulbound Token
  </text>
  <text x="800" y="105" text-anchor="middle" font-size="18" fill="#64748b">
    Verun issues a verifiable trust credential — agents never hold a wallet
  </text>

  <!-- ===== AGENT ===== -->
  <g filter="url(#shadow)">
    <rect x="80" y="180" width="380" height="380" rx="24" fill="#ffffff" stroke="#3b82f6" stroke-width="3"/>
    <rect x="80" y="180" width="380" height="76" rx="24" fill="url(#bluHead)"/>
    <rect x="80" y="232" width="380" height="24" fill="url(#bluHead)"/>
    <text x="270" y="232" text-anchor="middle" font-size="28" font-weight="800" fill="#ffffff">🤖  AI Agent</text>
  </g>

  <!-- Big icon -->
  <text x="270" y="335" text-anchor="middle" font-size="72">🆔</text>

  <text x="270" y="395" text-anchor="middle" font-size="22" font-weight="700" fill="#1e3a8a">Just an ID</text>
  <text x="270" y="440" text-anchor="middle" font-size="16" fill="#64748b">No wallet</text>
  <text x="270" y="465" text-anchor="middle" font-size="16" fill="#64748b">No keys</text>
  <text x="270" y="490" text-anchor="middle" font-size="16" fill="#64748b">No funds</text>

  <rect x="120" y="510" width="300" height="34" rx="17" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="270" y="532" text-anchor="middle" font-family="ui-monospace,SF Mono,Menlo,monospace" font-size="14" font-weight="600" fill="#1e40af">agt_openclaw_01</text>

  <!-- ===== VERUN (Center) ===== -->
  <g filter="url(#shadow)">
    <rect x="610" y="180" width="380" height="380" rx="24" fill="#ffffff" stroke="#16a34a" stroke-width="3"/>
    <rect x="610" y="180" width="380" height="76" rx="24" fill="url(#grnHead)"/>
    <rect x="610" y="232" width="380" height="24" fill="url(#grnHead)"/>
    <text x="800" y="232" text-anchor="middle" font-size="28" font-weight="800" fill="#ffffff">🛡️  Verun</text>
  </g>

  <text x="800" y="335" text-anchor="middle" font-size="72">🪪</text>

  <text x="800" y="395" text-anchor="middle" font-size="22" font-weight="700" fill="#15803d">Issues SBT</text>
  <text x="800" y="438" text-anchor="middle" font-size="16" fill="#64748b">3 validators agree</text>
  <text x="800" y="463" text-anchor="middle" font-size="16" fill="#64748b">Stored on-chain</text>
  <text x="800" y="488" text-anchor="middle" font-size="16" fill="#64748b">Tamper-proof</text>

  <rect x="650" y="510" width="300" height="34" rx="17" fill="#f0fdf4" stroke="#86efac"/>
  <text x="800" y="532" text-anchor="middle" font-size="14" font-weight="600" fill="#166534">2-of-3 consensus on Stellar</text>

  <!-- ===== CONSUMER ===== -->
  <g filter="url(#shadow)">
    <rect x="1140" y="180" width="380" height="380" rx="24" fill="#ffffff" stroke="#8b5cf6" stroke-width="3"/>
    <rect x="1140" y="180" width="380" height="76" rx="24" fill="url(#prpHead)"/>
    <rect x="1140" y="232" width="380" height="24" fill="url(#prpHead)"/>
    <text x="1330" y="232" text-anchor="middle" font-size="28" font-weight="800" fill="#ffffff">🏦  Platform</text>
  </g>

  <text x="1330" y="335" text-anchor="middle" font-size="72">✓</text>

  <text x="1330" y="395" text-anchor="middle" font-size="22" font-weight="700" fill="#6d28d9">Verifies SBT</text>
  <text x="1330" y="438" text-anchor="middle" font-size="16" fill="#64748b">Public lookup</text>
  <text x="1330" y="463" text-anchor="middle" font-size="16" fill="#64748b">Zero auth needed</text>
  <text x="1330" y="488" text-anchor="middle" font-size="16" fill="#64748b">~50ms response</text>

  <rect x="1180" y="510" width="300" height="34" rx="17" fill="#faf5ff" stroke="#ddd6fe"/>
  <text x="1330" y="532" text-anchor="middle" font-size="14" font-weight="600" fill="#7c3aed">tokenforge / auditor / regulator</text>

  <!-- ===== ARROWS ===== -->

  <!-- Arrow 1: Agent → Verun -->
  <path d="M 460 380 L 600 380" stroke="#2563eb" stroke-width="5" fill="none" marker-end="url(#aBlue)"/>
  <g transform="translate(530, 350)">
    <circle r="22" fill="#2563eb" filter="url(#shadow)"/>
    <text y="7" text-anchor="middle" font-size="20" font-weight="800" fill="#ffffff">1</text>
  </g>
  <text x="530" y="420" text-anchor="middle" font-size="14" font-weight="700" fill="#1e40af">request</text>

  <!-- Arrow 2: Verun → Consumer -->
  <path d="M 990 380 L 1130 380" stroke="#7c3aed" stroke-width="5" fill="none" marker-end="url(#aPrp)"/>
  <g transform="translate(1060, 350)">
    <circle r="22" fill="#7c3aed" filter="url(#shadow)"/>
    <text y="7" text-anchor="middle" font-size="20" font-weight="800" fill="#ffffff">2</text>
  </g>
  <text x="1060" y="420" text-anchor="middle" font-size="14" font-weight="700" fill="#6d28d9">verify</text>

  <!-- ===== KILL-SWITCH (bottom-right callout) ===== -->
  <g filter="url(#shadow)">
    <rect x="1140" y="610" width="380" height="200" rx="20" fill="#ffffff" stroke="#dc2626" stroke-width="2.5"/>
    <text x="1330" y="652" text-anchor="middle" font-size="20" font-weight="800" fill="#991b1b">🛑  Kill-switch</text>
    <text x="1330" y="685" text-anchor="middle" font-size="14" fill="#7f1d1d">If agent misbehaves, Verun</text>
    <text x="1330" y="705" text-anchor="middle" font-size="14" fill="#7f1d1d">revokes the SBT in ~5 seconds.</text>
    <text x="1330" y="745" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b">Emergency stop, like</text>
    <text x="1330" y="765" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b">"block my credit card"</text>
    <text x="1330" y="795" text-anchor="middle" font-size="11" fill="#7f1d1d" font-style="italic">Required by EU MiFID II Art. 17</text>
  </g>

  <!-- ===== MONEY FLOW (bottom-left callout) ===== -->
  <g filter="url(#shadow)">
    <rect x="80" y="610" width="1010" height="200" rx="20" fill="#fffbeb" stroke="#f59e0b" stroke-width="2.5"/>
    <text x="100" y="652" font-size="20" font-weight="800" fill="#92400e">💰  Money is separate</text>
    <text x="100" y="690" font-size="15" fill="#78350f">Verun is the <tspan font-weight="700">trust layer only</tspan> — Verun never touches funds.</text>
    <text x="100" y="715" font-size="15" fill="#78350f">The actual €5,000 EURC transfer happens on the platform (e.g. tokenforge),</text>
    <text x="100" y="740" font-size="15" fill="#78350f">using their own infrastructure. Verun&#39;s only job is &#8220;yes / no, this agent is verified.&#8221;</text>
    <text x="100" y="780" font-size="13" fill="#a16207" font-style="italic">Think of it like a security guard checking ID — the bank handles the actual money.</text>
  </g>

  <!-- Footer -->
  <text x="800" y="870" text-anchor="middle" font-size="12" fill="#9ca3af">
    Verun Stellar MVP  ·  verun-stellar-mvp.vercel.app  ·  BCP Partners GmbH 2026
  </text>
</svg>
